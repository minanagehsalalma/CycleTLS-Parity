name: "🔧 🚀 🟢 Manual publish"

on:
  workflow_dispatch:
    inputs:
      releaseCandidate:
        description: "Release Candidate"
        required: true
        default: "beta"

jobs:
  release:
    name: 🚀 Manual publish
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
        go-version: ['1.24']
    steps:
      - uses: actions/checkout@v4
      - name: 🟢 Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ./cycletls/go.sum

      - name: set name
        run: git config --global user.name 'Danny-Dasilva'

      - name: set email
        run: git config --global user.email '${{ secrets.EMAIL }}'

      - name: Get Package Name
        run: |
          echo "PACKAGE_NAME=$(node -p "try { require('./package.json').name } catch(e) {}")" >> $GITHUB_ENV
        id: package

      - name: Retrieve Latest Version
        run: |
          echo "LATEST_VERSION=$(npm view ${{ env.PACKAGE_NAME }} version)" >> $GITHUB_OUTPUT
        id: version

      - name: Update to latest version
        run: |
          npm version ${{ steps.version.outputs.LATEST_VERSION }} --allow-same-version

      - name: bump version
        run: |
          if [[ "${{ github.event.inputs.releaseCandidate }}" == "alpha" ]]; then
              npm version prerelease --preid alpha
          fi
          if [[ "${{ github.event.inputs.releaseCandidate }}" == "beta" ]]; then
              npm version prerelease --preid beta
          fi

      - name: Install golang dependencies
        run: cd cycletls && go mod download && go mod verify

      - name: Install npm dependencies
        run: npm ci --unsafe-perm

      - name: Tag Submodule
        run: |
          VERSION=$(npm version --json | jq -r '.cycletls')
          SUBMODULE_VERSION="cycletls/v${VERSION}"
          git tag $SUBMODULE_VERSION cycletls/
          git push origin $SUBMODULE_VERSION

      - name: 🚀 publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN}}

      - name: Push git
        run: git add * && git commit -a -m "[RELEASE] %s" && git push
