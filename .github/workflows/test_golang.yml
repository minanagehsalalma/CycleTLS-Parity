name: 🧪 Go Tests

on:
  push:
    branches: [main, 'version/**']
  pull_request:

jobs:
  go-unit:
    name: Go Unit
    strategy:
      matrix:
        go-version: ['1.24']
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ./cycletls/go.sum

      - name: Download Dependencies
        working-directory: ./cycletls
        run: go mod download

      - name: Build
        working-directory: ./cycletls
        run: go build -v ./...

      - name: Unit Test
        working-directory: ./cycletls
        run: go test -race -v ./...

  go-integration:
    name: Go Integration (soft-fail)
    strategy:
      matrix:
        go-version: ['1.24']
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    # Non-blocking: failures don't fail the workflow
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ./cycletls/go.sum

      - name: Download Dependencies
        working-directory: ./cycletls
        run: go mod download

      - name: Build
        working-directory: ./cycletls
        run: go build -v ./...

      - name: Start SOCKS Proxy (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          # Download pre-built gost binary (simple SOCKS5 proxy, faster than Tor)
          curl -sL https://github.com/go-gost/gost/releases/download/v3.2.6/gost_3.2.6_linux_amd64.tar.gz | tar xz
          nohup ./gost -L socks5://127.0.0.1:9050 > /tmp/gost.log 2>&1 &
          # Wait for proxy to be ready
          for i in {1..30}; do
            if nc -z 127.0.0.1 9050 2>/dev/null; then
              echo "SOCKS proxy is ready on port 9050"
              break
            fi
            sleep 1
          done

      - name: Start SOCKS Proxy (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          # Download pre-built gost binary (faster than brew install)
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            curl -sL https://github.com/go-gost/gost/releases/download/v3.2.6/gost_3.2.6_darwin_arm64.tar.gz | tar xz
          else
            curl -sL https://github.com/go-gost/gost/releases/download/v3.2.6/gost_3.2.6_darwin_amd64.tar.gz | tar xz
          fi
          nohup ./gost -L socks5://127.0.0.1:9050 > /tmp/gost.log 2>&1 &
          # Wait for proxy to be ready
          for i in {1..30}; do
            if nc -z 127.0.0.1 9050 2>/dev/null; then
              echo "SOCKS proxy is ready on port 9050"
              break
            fi
            sleep 1
          done

      - name: Integration Tests (excluding tlsfingerprint)
        id: integration-tests
        working-directory: ./cycletls
        run: |
          go test -race -v -tags=integration ./tests/integration/... -skip 'tlsfingerprint'

      - name: Report integration test results
        if: always()
        run: |
          if [ "${{ steps.integration-tests.outcome }}" == "failure" ]; then
            echo "::warning::Integration tests failed - see logs for details"
          fi

  go-tls-fingerprint:
    name: Go TLS Fingerprint
    strategy:
      matrix:
        go-version: ['1.24']
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    # Blocking: failures fail the workflow

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ./cycletls/go.sum

      - name: Download Dependencies
        working-directory: ./cycletls
        run: go mod download

      - name: Build
        working-directory: ./cycletls
        run: go build -v ./...

      - name: TLS Fingerprint Integration Tests
        working-directory: ./cycletls
        run: go test -race -v -tags=integration ./tests/integration/tlsfingerprint/...
