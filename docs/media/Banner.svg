<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">CycleTLS Parity banner</title>
  <desc id="desc">Dark banner for the CycleTLS Parity fork highlighting browser parity under heavy fingerprinting.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071018" />
      <stop offset="55%" stop-color="#0b1722" />
      <stop offset="100%" stop-color="#050a10" />
    </linearGradient>
    <radialGradient id="glow-left" cx="0.18" cy="0.22" r="0.55">
      <stop offset="0%" stop-color="#1bc7cf" stop-opacity="0.34" />
      <stop offset="60%" stop-color="#1bc7cf" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#1bc7cf" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-right" cx="0.92" cy="0.86" r="0.42">
      <stop offset="0%" stop-color="#57d38c" stop-opacity="0.22" />
      <stop offset="60%" stop-color="#57d38c" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#57d38c" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121d28" />
      <stop offset="100%" stop-color="#0b141d" />
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#243646" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#1a2937" stop-opacity="0.55" />
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.38" />
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)" />
  <rect width="1280" height="720" fill="url(#glow-left)" />
  <rect width="1280" height="720" fill="url(#glow-right)" />

  <g opacity="0.2">
    <circle cx="1130" cy="128" r="118" fill="none" stroke="#79d7ff" stroke-width="2" />
    <circle cx="1130" cy="128" r="92" fill="none" stroke="#79d7ff" stroke-width="2" />
    <circle cx="1130" cy="128" r="66" fill="none" stroke="#79d7ff" stroke-width="2" />
    <path d="M1060 198c30-22 69-34 114-34 18 0 37 2 54 6" fill="none" stroke="#79d7ff" stroke-width="2" stroke-linecap="round" />
  </g>

  <g transform="translate(74 72)">
    <rect x="0" y="0" rx="24" ry="24" width="138" height="42" fill="#0d2130" stroke="#2a6275" />
    <text x="69" y="28" text-anchor="middle" fill="#86dcff" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="1.6">FORK-ONLY</text>

    <text x="0" y="128" fill="#f2f7fb" font-family="Segoe UI, Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="1.6">CYCLETLS</text>
    <text x="0" y="212" fill="#78d8ff" font-family="Segoe UI, Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="3.2">PARITY</text>

    <text x="0" y="278" fill="#dce7f0" font-family="Segoe UI, Arial, sans-serif" font-size="31" font-weight="600">
      Browser parity under heavy fingerprinting
    </text>
    <text x="0" y="324" fill="#9eb0bf" font-family="Segoe UI, Arial, sans-serif" font-size="24">
      Deterministic Chrome TLS, exact Chromium H2, and stricter header ordering.
    </text>
    <text x="0" y="359" fill="#9eb0bf" font-family="Segoe UI, Arial, sans-serif" font-size="24">
      Proof that survives real gated targets.
    </text>

    <g transform="translate(0 424)">
      <rect x="0" y="0" rx="22" ry="22" width="254" height="58" fill="#121d28" stroke="#243646" />
      <text x="127" y="37" text-anchor="middle" fill="#f1f6fb" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Deterministic Chrome TLS</text>

      <rect x="274" y="0" rx="22" ry="22" width="220" height="58" fill="#121d28" stroke="#243646" />
      <text x="384" y="37" text-anchor="middle" fill="#f1f6fb" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Exact Chromium H2</text>

      <rect x="514" y="0" rx="22" ry="22" width="218" height="58" fill="#121d28" stroke="#243646" />
      <text x="623" y="37" text-anchor="middle" fill="#f1f6fb" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Strict Header Order</text>
    </g>
  </g>

  <g transform="translate(900 136)" filter="url(#soft-shadow)">
    <rect x="0" y="0" rx="30" ry="30" width="346" height="448" fill="url(#panel)" stroke="url(#border)" />

    <rect x="28" y="32" rx="18" ry="18" width="290" height="168" fill="#0f1821" stroke="#22313e" />
    <text x="52" y="74" fill="#7fdcff" font-family="Consolas, 'Courier New', monospace" font-size="24">probe.ip</text>
    <text x="178" y="74" fill="#ffd166" font-family="Consolas, 'Courier New', monospace" font-size="24">198.51.100.77</text>
    <text x="52" y="114" fill="#7fdcff" font-family="Consolas, 'Courier New', monospace" font-size="24">ja4_r</text>
    <text x="178" y="114" fill="#f3f7fb" font-family="Consolas, 'Courier New', monospace" font-size="24">matched</text>
    <text x="52" y="154" fill="#7fdcff" font-family="Consolas, 'Courier New', monospace" font-size="24">h2</text>
    <text x="178" y="154" fill="#f3f7fb" font-family="Consolas, 'Courier New', monospace" font-size="24">1:65536;2:0;...</text>

    <rect x="236" y="42" rx="18" ry="18" width="68" height="42" fill="#1a4730" />
    <text x="270" y="70" text-anchor="middle" fill="#d8ffe9" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="800">200</text>

    <rect x="28" y="228" rx="18" ry="18" width="290" height="186" fill="#0c141c" stroke="#22313e" />
    <text x="52" y="274" fill="#f3f7fb" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Why this fork exists</text>
    <text x="52" y="320" fill="#9eb0bf" font-family="Segoe UI, Arial, sans-serif" font-size="22">Upstream primitives were strong.</text>
    <text x="52" y="355" fill="#9eb0bf" font-family="Segoe UI, Arial, sans-serif" font-size="22">The last mile still needed:</text>
    <text x="52" y="394" fill="#57d38c" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">+ deterministic wire behavior</text>
    <text x="52" y="426" fill="#57d38c" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">+ parity proof on real targets</text>

    <rect x="28" y="432" rx="18" ry="18" width="142" height="44" fill="#0d2130" stroke="#2c6174" />
    <text x="99" y="460" text-anchor="middle" fill="#85dbff" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">browser parity</text>

    <rect x="182" y="432" rx="18" ry="18" width="136" height="44" fill="#15261e" stroke="#2f5e47" />
    <text x="250" y="460" text-anchor="middle" fill="#93e6bb" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">real proof</text>
  </g>
</svg>
